name: Build

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'releases/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew shadowJar --no-daemon

      - name: Copy JAR to releases folder
        run: |
          mkdir -p releases
          cp build/libs/GriefPreventionFlagsReborn-1.0.0.jar releases/GriefPreventionFlagsRebornDev${{ github.run_number }}.jar

      - name: Commit dev build
        run: |
          git config user.name "Midnwave"
          git config user.email "212578924+Midnwave@users.noreply.github.com"
          git add releases/
          git diff --staged --quiet || git commit -m "ci: dev build ${{ github.run_number }} [skip ci]"
          git push
